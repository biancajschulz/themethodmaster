name: Submit a Method
description: Contribute a method and your experience
title: "New Method: "
labels: ["new-method"]
body:
  - type: input
    id: method_name
    attributes:
      label: Method Name
      description: What is the name of the method? If it is your own method, what do you call it?
    validations:
      required: true

  - type: input
    id: method_url
    attributes:
      label: Method URL
      description: Where can readers learn more about the method? If there is no good website, can you write an article about it?
      placeholder: https://example.com
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: Purpose
      description: What is the method for?
    validations:
      required: true

  - type: textarea
    id: theory
    attributes:
      label: Underlying Theory / Principles
      description: What are the underlying principles or theory? Can you explain them in your own words?
    validations:
      required: true

  - type: textarea
    id: how_it_works
    attributes:
      label: How does it work?
      description: How is the method applied at a high level?
    validations:
      required: true

  - type: textarea
    id: experience
    attributes:
      label: Experience
      description: What was your experience applying the method? What went well? What did not? Would you recommend it?
    validations:
      required: true

  - type: input
    id: industry
    attributes:
      label: Industry
      description: Which industry was the method applied in?
      placeholder: e.g., Finance, Healthcare, Automotive
    validations:
      required: false

  - type: dropdown
    id: organization_size
    attributes:
      label: Organization Size
      description: How large was the organization?
      options:
        - "<10"
        - "<50"
        - "<200"
        - "<1000"
        - "<5000"
        - ">5000"
    validations:
      required: false

  - type: input
    id: teams_applied_to
    attributes:
      label: Teams Applied To
      description: How many teams applied this method in your organization?
    validations:
      required: false

  - type: input
    id: people_per_team
    attributes:
      label: People Per Team
      description: How many people were on each team on average?
    validations:
      required: false

  - type: input
    id: roles
    attributes:
      label: Roles
      description: Which roles did the team consist of?
      placeholder: e.g., Devs, PMs
    validations:
      required: false

  - type: input
    id: leadership_levels
    attributes:
      label: Leadership or Hierarchy Levels Involved
      description: How many leadership or hierarchy levels were involved?
    validations:
      required: false

  - type: input
    id: frequency
    attributes:
      label: Frequency
      description: How often was the method applied?
      placeholder: e.g., Daily
    validations:
      required: false

  - type: input
    id: time_period
    attributes:
      label: Time Period
      description: Over what period of time was the method applied?
    validations:
      required: false

  - type: input
    id: customer_layers
    attributes:
      label: Layers Between You and the Customer
      description: How many layers were there between you and the customer?
    validations:
      required: false

  - type: textarea
    id: when_it_breaks
    attributes:
      label: When does it break?
      description: What are the limitations of the method?
    validations:
      required: false

  - type: textarea
    id: tips
    attributes:
      label: Tips
      description: What tips or tricks would you recommend for success?
    validations:
      required: false
  - type: textarea
    id: process
    attributes:
      label: Process (High-level)
      description: The big picture / high-level process.
    validations:
      required: true

  - type: markdown
    attributes:
      value: "## Optional Details"

  - type: textarea
    id: experience
    attributes:
      label: Experience
      description: How do you like the method? What went well, what broke?

  - type: input
    id: author
    attributes:
      label: Author
      description: Your Name

  - type: input
    id: industry
    attributes:
      label: Industry
      placeholder: e.g. Finance, Healthcare

  - type: dropdown
    id: org_size
    attributes:
      label: Organization Size
      options: ["<10", "<50", "<200", "<1000", "<5000", ">5000"]

  - type: input
    id: teams_count
    attributes:
      label: Teams Applied To
      placeholder: e.g. 3

  - type: input
    id: people_per_team
    attributes:
      label: People Per Team
      placeholder: e.g. 5

  - type: input
    id: roles
    attributes:
      label: Roles
      placeholder: e.g. Devs, PMs

  - type: input
    id: leadership_levels
    attributes:
      label: Leadership or Hierarchy Levels Involved
      placeholder: e.g. 2

  - type: input
    id: frequency
    attributes:
      label: Frequency
      placeholder: e.g. Daily

  - type: input
    id: time_period
    attributes:
      label: Time Period
      placeholder: e.g. 6 months

  - type: input
    id: layers_to_customer
    attributes:
      label: Layers between you and the Customer
      placeholder: e.g. 2

  - type: textarea
    id: when_it_breaks
    attributes:
      label: When it breaks
      description: Limitations of the method.

  - type: textarea
    id: tips
    attributes:
      label: Tips
      description: Tips and tricks for success.
