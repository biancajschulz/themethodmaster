name: Issue to PR

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create method file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 scripts/create_pr.py --body "$ISSUE_BODY"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: methods/issue-${{ github.event.issue.number }}
          commit-message: "New Method: ${{ github.event.issue.title }}"
          title: "New Method: ${{ github.event.issue.title }}"
          body: |
            Closes #${{ github.event.issue.number }}
            Submitted by @${{ github.event.issue.user.login }}
          labels: |
            new-method