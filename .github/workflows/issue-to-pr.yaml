name: Issue to PR

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create method file
        run: |
          python3 scripts/create_pr.py --body "${{ github.event.issue.body }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: methods/new-method
          title: "New Method: ${{ github.event.issue.title }}"
          body: "Issue #${{ github.event.issue.number }} submitted by ${{ github.event.issue.user.login }}"
          labels: |
            new-method